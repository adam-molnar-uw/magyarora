<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF5EF" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1A1411" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="Personal Hungarian language study app" />

  <title>Magyaróra — Hungarian Lessons</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./styles.css" />

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div class="boot">
      <div class="boot-title">Magyaróra</div>
      <div class="boot-sub">Loading…</div>
    </div>
  </div>

  <!-- Data: edit this file weekly to add lessons -->
  <script src="./lessons.js"></script>

  <!-- Storage + spaced-repetition logic -->
  <script src="./srs.js"></script>

  <!-- Main app -->
  <script type="text/babel" data-presets="react" src="./app.js"></script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          // Listen for updates
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                window.dispatchEvent(new CustomEvent('app-update-available'));
              }
            });
          });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
